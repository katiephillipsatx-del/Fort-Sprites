<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortnite Runners — Sprite Tracker</title>
<style>
  :root {
    --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    --accent: #e94560;
    --gold: #f5b942;
    --green: #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 20px;
    color: #222;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    background: #fdf6ee;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  header { text-align: center; margin-bottom: 16px; }
  header .logo { font-size: 13px; font-weight: 800; letter-spacing: 2px; color: #666; text-transform: uppercase; }
  header h1 {
    font-size: 36px; margin: 4px 0;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-weight: 900; letter-spacing: 1px;
  }

  /* Name banner */
  .name-bar {
    display: flex; align-items: center; gap: 10px; justify-content: center;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .name-bar input {
    border: 2px solid #ddd; border-radius: 8px; padding: 6px 12px;
    font-size: 14px; font-weight: 700; width: 180px;
  }
  .name-bar input:focus { outline: none; border-color: var(--accent); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid #e5e0d8; }
  .tab {
    padding: 8px 20px; cursor: pointer; border-radius: 8px 8px 0 0;
    font-weight: 700; font-size: 14px; border: none; background: transparent; color: #888;
  }
  .tab.active { background: var(--accent); color: #fff; }

  /* Progress */
  .progress-wrap {
    display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center;
  }
  .progress-bar { flex: 1; min-width: 200px; max-width: 400px; height: 14px; background: #e5e0d8; border-radius: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); width: 0%; transition: width 0.3s; }
  #progressText { font-weight: 700; font-size: 14px; }

  /* Controls */
  .controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
  button {
    cursor: pointer; border: none; border-radius: 8px; padding: 8px 16px;
    font-weight: 700; font-size: 13px; background: var(--accent); color: #fff;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.96); }
  button.secondary { background: #555; }
  button.green { background: var(--green); }

  /* Checklist grid */
  .category { margin-bottom: 22px; }
  .category h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #555; border-bottom: 2px solid var(--gold); padding-bottom: 4px; margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(76px, 1fr)); gap: 8px; }
  .sprite-item {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    background: #fff; border-radius: 10px; padding: 8px 4px;
    border: 2px solid #eee; transition: border-color 0.2s, background 0.2s; cursor: pointer;
  }
  .sprite-item.checked { border-color: var(--accent); background: #fff0f3; }
  .sprite-item .name { font-size: 10px; text-align: center; color: #666; line-height: 1.2; min-height: 24px; }
  .sprite-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; }

  /* Share panel */
  .share-box {
    background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 20px;
    border: 2px solid #e5e0d8;
  }
  .share-box h3 { margin: 0 0 10px; font-size: 15px; }
  .share-url {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .share-url input {
    flex: 1; min-width: 200px; border: 2px solid #ddd; border-radius: 8px;
    padding: 6px 10px; font-size: 12px; font-family: monospace; background: #f5f5f5;
  }

  /* Group view */
  #groupTab { display: none; }
  .add-member-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .add-member-row input {
    flex: 1; min-width: 220px; border: 2px solid #ddd; border-radius: 8px;
    padding: 8px 12px; font-size: 13px;
  }
  .group-grid {
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f0ebe2; padding: 8px; text-align: center; position: sticky; top: 0; }
  thead th.sprite-col { text-align: left; font-weight: 600; width: 140px; }
  thead th.member-col { min-width: 90px; }
  tbody tr:nth-child(even) { background: #fdf6ee; }
  tbody td { padding: 5px 8px; text-align: center; border-bottom: 1px solid #eee; }
  tbody td.sprite-name { text-align: left; font-size: 12px; color: #555; }
  .check-cell { font-size: 16px; }
  .cat-header td { background: #e8e0d5 !important; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #555; padding: 6px 8px; }
  .member-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff; border-radius: 20px;
    padding: 3px 10px; font-size: 12px; font-weight: 700;
  }
  .member-tag button { background: none; padding: 0; font-size: 14px; line-height: 1; color: #fff; opacity: 0.7; }
  .member-tag button:hover { opacity: 1; }
  .members-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 700; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }

  @media print { .controls, .tabs, .share-box, .name-bar { display: none; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Fortnite Runners — Chapter 7 Season 3</div>
    <h1>Sprite Tracker</h1>
  </header>

  <div class="name-bar">
    <span style="font-weight:700;font-size:14px;">Your name:</span>
    <input type="text" id="nameInput" placeholder="Enter your name" maxlength="20">
  </div>

  <div class="tabs">
    <button class="tab active" id="tabMine" onclick="switchTab('mine')">My Checklist</button>
    <button class="tab" id="tabGroup" onclick="switchTab('group')">Group View</button>
  </div>

  <!-- MY CHECKLIST -->
  <div id="mineTab">
    <div class="progress-wrap">
      <span id="progressText">0 / 0</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span id="progressPct">0%</span>
    </div>
    <div class="controls">
      <button onclick="resetAll()" class="secondary">Reset All</button>
      <button onclick="checkAll()">Check All</button>
      <button onclick="window.print()" class="secondary">Print / PDF</button>
    </div>
    <div class="share-box">
      <h3>Share your progress link</h3>
      <p style="margin:0 0 10px;font-size:13px;color:#666;">Copy and send this link — friends can paste it into the Group View to see your collection.</p>
      <div class="share-url">
        <input type="text" id="shareUrl" readonly>
        <button class="green" onclick="copyShare()">Copy Link</button>
      </div>
    </div>
    <div id="categories"></div>
  </div>

  <!-- GROUP VIEW -->
  <div id="groupTab">
    <p style="font-size:13px;color:#666;margin-top:0;">Paste a friend's share link below to add them to the group view.</p>
    <div class="add-member-row">
      <input type="text" id="memberInput" placeholder="Paste share link here…">
      <button onclick="addMember()" class="green">Add Member</button>
    </div>
    <div class="members-list" id="membersList"></div>
    <div class="group-grid">
      <table id="groupTable">
        <thead id="groupHead"></thead>
        <tbody id="groupBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const categories = [
  { name: "Classic Sprites", items: ["Blue Sprite","Yellow Sprite","Pink Sprite","Purple Sprite","Silver Sprite","Teal Sprite"] },
  { name: "Pastel Sprites", items: ["Cream Sprite","Tan Sprite","Coral Sprite","Lavender Sprite","Magenta Sprite"] },
  { name: "Camo Sprites", items: ["Tan Camo","Olive Camo","Coral Camo","Purple Camo","Navy Camo"] },
  { name: "Stone Sprites", items: ["Brown Stone","Tan Stone","Coral Stone","Charcoal Stone","Silver Stone"] },
  { name: "Metallic Sprites", items: ["Gold Metallic","Rose Gold","Ruby","Amethyst","Onyx","Straw Hat"] },
  { name: "Fire Sprites", items: ["Orange Fire","Gold Fire","Coral Fire","Purple Fire","Pink Fire"] },
  { name: "Spiked Sprites", items: ["Black Spiked","Gold Spiked","Coral Spiked","Purple Spiked","Silver Spiked","Navy Spiked"] },
  { name: "Sunglasses Sprites", items: ["Black Shades","Gold Shades","Purple Shades","Silver Shades","Green Shades"] },
  { name: "Demon Sprites", items: ["Red Demon","Gold Demon","Coral Demon","Purple Demon","White Demon"] },
  { name: "Skull Sprites", items: ["Hooded Skull","Gold Skull","Coral Skull","Purple Skull","Silver Skull"] },
  { name: "Ghost Sprites", items: ["White Ghost","Gold Ghost","Coral Ghost","Purple Ghost","Teal Ghost"] },
  { name: "Horned Sprites", items: ["Red Horned","Gold Horned","Coral Horned","Purple Horned"] },
  { name: "Soccer Sprites", items: ["Soccer Star","Gold Chick","Coral Chick","Navy Chick","Pink Chick"] },
  { name: "Crowned Sprites", items: ["Silver Crown","Gold Crown","Coral Crown","Purple Crown","Frost Crown"] },
  { name: "Hooded Sprites", items: ["Black Hood","Gold Hood","Coral Hood","Purple Hood","Silver Hood"] },
  { name: "Cosmic Sprites", items: ["Purple Cosmic","Red Cosmic","Coral Cosmic","Silver Cosmic","Lilac Cosmic"] },
  { name: "Hero Sprites", items: ["Spider Blue","Spider Gold","Spider Coral","Spider Purple","Spider Green"] }
];

const STORAGE_KEY = "fortniteSpriteTracker_v2";
const NAME_KEY = "fortniteSpriteTrackerName";
const MEMBERS_KEY = "fortniteSpriteTrackerMembers";

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function getName() { return localStorage.getItem(NAME_KEY) || ""; }
function saveName(n) { localStorage.setItem(NAME_KEY, n); }
function loadMembers() {
  try { return JSON.parse(localStorage.getItem(MEMBERS_KEY)) || []; }
  catch(e) { return []; }
}
function saveMembers(m) { localStorage.setItem(MEMBERS_KEY, JSON.stringify(m)); }

function encodeState(name, state) {
  const bits = [];
  categories.forEach((cat, ci) => {
    cat.items.forEach((item, ii) => {
      bits.push(state[`c${ci}-i${ii}`] ? '1' : '0');
    });
  });
  const data = { n: name, b: bits.join('') };
  return btoa(encodeURIComponent(JSON.stringify(data)));
}

function decodeState(encoded) {
  try {
    const data = JSON.parse(decodeURIComponent(atob(encoded)));
    const state = {};
    let idx = 0;
    categories.forEach((cat, ci) => {
      cat.items.forEach((item, ii) => {
        state[`c${ci}-i${ii}`] = data.b[idx++] === '1';
      });
    });
    return { name: data.n, state };
  } catch(e) { return null; }
}

function buildShareUrl() {
  const name = getName() || "Anonymous";
  const encoded = encodeState(name, loadState());
  const url = new URL(window.location.href.split('?')[0].split('#')[0]);
  url.hash = encoded;
  return url.toString();
}

function updateShareUrl() {
  const el = document.getElementById('shareUrl');
  if (el) el.value = buildShareUrl();
}

function copyShare() {
  const url = buildShareUrl();
  navigator.clipboard.writeText(url).then(() => showToast('Link copied!')).catch(() => {
    document.getElementById('shareUrl').select();
    document.execCommand('copy');
    showToast('Link copied!');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Name input
const nameInput = document.getElementById('nameInput');
nameInput.value = getName();
nameInput.addEventListener('input', () => {
  saveName(nameInput.value.trim());
  updateShareUrl();
});

function switchTab(tab) {
  document.getElementById('mineTab').style.display = tab === 'mine' ? '' : 'none';
  document.getElementById('groupTab').style.display = tab === 'group' ? '' : 'none';
  document.getElementById('tabMine').classList.toggle('active', tab === 'mine');
  document.getElementById('tabGroup').classList.toggle('active', tab === 'group');
  if (tab === 'group') renderGroup();
}

function render() {
  const state = loadState();
  const container = document.getElementById('categories');
  container.innerHTML = '';
  categories.forEach((cat, ci) => {
    const section = document.createElement('div');
    section.className = 'category';
    const h2 = document.createElement('h2');
    h2.textContent = cat.name;
    section.appendChild(h2);
    const grid = document.createElement('div');
    grid.className = 'grid';
    cat.items.forEach((item, ii) => {
      const id = `c${ci}-i${ii}`;
      const wrap = document.createElement('label');
      wrap.className = 'sprite-item' + (state[id] ? ' checked' : '');
      wrap.htmlFor = id;
      const nameDiv = document.createElement('div');
      nameDiv.className = 'name';
      nameDiv.textContent = item;
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = id;
      cb.checked = !!state[id];
      cb.addEventListener('change', () => {
        const s = loadState();
        s[id] = cb.checked;
        saveState(s);
        wrap.classList.toggle('checked', cb.checked);
        updateProgress();
        updateShareUrl();
      });
      wrap.appendChild(nameDiv);
      wrap.appendChild(cb);
      grid.appendChild(wrap);
    });
    section.appendChild(grid);
    container.appendChild(section);
  });
  updateProgress();
  updateShareUrl();
}

function updateProgress() {
  const state = loadState();
  const total = categories.reduce((s, c) => s + c.items.length, 0);
  const checked = Object.values(state).filter(Boolean).length;
  const pct = total ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progressText').textContent = `${checked} / ${total}`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

function resetAll() {
  if (confirm('Reset all checkboxes?')) { localStorage.removeItem(STORAGE_KEY); render(); }
}
function checkAll() {
  const s = {};
  categories.forEach((cat, ci) => cat.items.forEach((_, ii) => { s[`c${ci}-i${ii}`] = true; }));
  saveState(s);
  render();
}

// GROUP VIEW
function addMember() {
  const input = document.getElementById('memberInput');
  const raw = input.value.trim();
  if (!raw) return;

  let encoded = raw;
  try {
    const url = new URL(raw);
    encoded = url.hash.replace('#', '');
  } catch(e) {}

  const decoded = decodeState(encoded);
  if (!decoded) { showToast('Invalid link — make sure you pasted the full share URL.'); return; }

  const members = loadMembers();
  const existing = members.findIndex(m => m.name === decoded.name);
  if (existing >= 0) members[existing] = { name: decoded.name, encoded };
  else members.push({ name: decoded.name, encoded });
  saveMembers(members);
  input.value = '';
  renderGroup();
  showToast(`Added ${decoded.name}!`);
}

function removeMember(name) {
  const members = loadMembers().filter(m => m.name !== name);
  saveMembers(members);
  renderGroup();
}

function renderGroup() {
  const members = loadMembers();
  // Always include self
  const myName = getName() || 'Me';
  const myDecoded = { name: myName, state: loadState() };
  const allMembers = [myDecoded, ...members.map(m => decodeState(m.encoded)).filter(Boolean)];

  // Render member tags
  const membersList = document.getElementById('membersList');
  membersList.innerHTML = '';
  members.forEach(m => {
    const tag = document.createElement('span');
    tag.className = 'member-tag';
    tag.innerHTML = `${m.name} <button onclick="removeMember('${m.name.replace(/'/g,"\\'")}')">✕</button>`;
    membersList.appendChild(tag);
  });

  // Build table
  const head = document.getElementById('groupHead');
  const body = document.getElementById('groupBody');
  head.innerHTML = '';
  body.innerHTML = '';

  const headRow = document.createElement('tr');
  const spriteHeader = document.createElement('th');
  spriteHeader.className = 'sprite-col';
  spriteHeader.textContent = 'Sprite';
  headRow.appendChild(spriteHeader);
  allMembers.forEach(m => {
    const th = document.createElement('th');
    th.className = 'member-col';
    th.textContent = m.name;
    headRow.appendChild(th);
  });
  head.appendChild(headRow);

  categories.forEach((cat, ci) => {
    const catRow = document.createElement('tr');
    const catTd = document.createElement('td');
    catTd.className = 'sprite-name';
    catTd.colSpan = allMembers.length + 1;
    catTd.textContent = cat.name;
    catRow.appendChild(catTd);
    catRow.classList.add('cat-header');
    body.appendChild(catRow);

    cat.items.forEach((item, ii) => {
      const id = `c${ci}-i${ii}`;
      const row = document.createElement('tr');
      const nameTd = document.createElement('td');
      nameTd.className = 'sprite-name';
      nameTd.textContent = item;
      row.appendChild(nameTd);
      allMembers.forEach(m => {
        const td = document.createElement('td');
        td.className = 'check-cell';
        td.textContent = m.state[id] ? '✅' : '—';
        row.appendChild(td);
      });
      body.appendChild(row);
    });
  });
}

// Check URL hash on load — if contains encoded state, offer to load it
window.addEventListener('load', () => {
  const hash = window.location.hash.replace('#', '');
  if (hash) {
    const decoded = decodeState(hash);
    if (decoded) {
      // Add as member automatically if not self
      const myName = getName();
      if (decoded.name !== myName) {
        const members = loadMembers();
        if (!members.find(m => m.name === decoded.name)) {
          members.push({ name: decoded.name, encoded: hash });
          saveMembers(members);
          showToast(`Added ${decoded.name} to Group View!`);
        }
        switchTab('group');
        renderGroup();
      }
      history.replaceState(null, '', window.location.pathname);
    }
  }
});

render();
</script>
</body>
</html>
